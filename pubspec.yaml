name: cyberops
description: "Capstone project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.3.2
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  flutter_launcher_icons: ^0.14.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/default_scenarios.json
    - assets/images/
    
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/cyberops_logo.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/cyberops_logo.jpg"
